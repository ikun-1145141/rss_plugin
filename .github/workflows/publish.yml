name: Publish Plugin

on:
  push:
    branches: [main]
    paths:
      - 'manifest.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.MPDT_GITHUB_TOKEN }}

      - name: Configure git credentials
        env:
          GH_TOKEN: ${{ secrets.MPDT_GITHUB_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.MPDT_GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git remote set-url origin https://github.com/${{ github.repository }}.git

      - name: Check version change
        id: version
        run: |
          CURRENT=$(python -c "import json; print(json.load(open('manifest.json'))['version'])")
          PREVIOUS=$(git show HEAD~1:manifest.json 2>/dev/null | python -c "import json,sys; print(json.load(sys.stdin)['version'])" || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "previous=$PREVIOUS" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📦 版本变更: $PREVIOUS -> $CURRENT"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ 版本未变更，跳过发布"
          fi

      - name: Set up Python
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mofox-plugin-dev-toolkit
        if: steps.version.outputs.changed == 'true'
        run: pip install mofox-plugin-dev-toolkit

      - name: Configure GitHub token
        if: steps.version.outputs.changed == 'true'
        run: mpdt config edit github.token ${{ secrets.MPDT_GITHUB_TOKEN }}

      - name: Publish plugin
        if: steps.version.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.MPDT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.MPDT_GITHUB_TOKEN }}
        run: |
          # 移除 checkout action 设置的默认 GITHUB_TOKEN header，避免覆盖 mpdt 的 PAT
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          echo "remote=$(git remote get-url origin)"
          mpdt market package-update .

      - name: Summary
        if: steps.version.outputs.changed == 'true'
        run: echo "✅ rss_plugin v${{ steps.version.outputs.current }} 已发布" >> $GITHUB_STEP_SUMMARY
