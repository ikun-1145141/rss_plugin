name: Publish Plugin

on:
  push:
    branches: [main]
    paths:
      - 'manifest.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.MPDT_GITHUB_TOKEN }}

      - name: Configure git credentials
        env:
          GH_TOKEN: ${{ secrets.MPDT_GITHUB_TOKEN }}
        run: |
          # GIT_ASKPASS 脚本：拦截所有 git 认证请求，强制使用 PAT
          cat > /tmp/git-askpass.sh << 'ASKPASS_EOF'
          #!/bin/bash
          echo "askpass called: $* env=$MPDT_GITHUB_TOKEN" >> /tmp/git-askpass.log
          echo "${MPDT_GITHUB_TOKEN}"
          ASKPASS_EOF
          chmod +x /tmp/git-askpass.sh
          # 写入 credential store 兜底
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.MPDT_GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git remote set-url origin https://github.com/${{ github.repository }}.git
          echo "=== 验证配置 ==="
          echo "remote: $(git remote get-url origin)"
          echo "askpass: $(cat /tmp/git-askpass.sh)"
          echo "credentials: $(cat ~/.git-credentials | head -c 30)..."

      - name: Check version change
        id: version
        run: |
          CURRENT=$(python -c "import json; print(json.load(open('manifest.json'))['version'])")
          PREVIOUS=$(git show HEAD~1:manifest.json 2>/dev/null | python -c "import json,sys; print(json.load(sys.stdin)['version'])" || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "previous=$PREVIOUS" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📦 版本变更: $PREVIOUS -> $CURRENT"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ 版本未变更，跳过发布"
          fi

      - name: Set up Python
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mofox-plugin-dev-toolkit
        if: steps.version.outputs.changed == 'true'
        run: pip install mofox-plugin-dev-toolkit

      - name: Configure GitHub token
        if: steps.version.outputs.changed == 'true'
        run: mpdt config edit github.token ${{ secrets.MPDT_GITHUB_TOKEN }}

      - name: Publish plugin
        if: steps.version.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.MPDT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.MPDT_GITHUB_TOKEN }}
          MPDT_GITHUB_TOKEN: ${{ secrets.MPDT_GITHUB_TOKEN }}
          GIT_ASKPASS: /tmp/git-askpass.sh
        run: |
          echo "GIT_ASKPASS=$GIT_ASKPASS"
          echo "MPDT_GITHUB_TOKEN=${MPDT_GITHUB_TOKEN:+已设置(${#MPDT_GITHUB_TOKEN}字符)}"
          echo "remote=$(git remote get-url origin)"
          mpdt market package-update . || {
            echo "=== askpass 调用日志 ==="
            cat /tmp/git-askpass.log 2>/dev/null || echo "(无日志，askpass 从未被调用)"
            exit 1
          }
          echo "=== askpass 调用日志 ==="
          cat /tmp/git-askpass.log 2>/dev/null || echo "(无日志，askpass 从未被调用)"

      - name: Summary
        if: steps.version.outputs.changed == 'true'
        run: echo "✅ rss_plugin v${{ steps.version.outputs.current }} 已发布" >> $GITHUB_STEP_SUMMARY
